name: Hupp data feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Hupp feed
        working-directory: ${{ github.workspace }}
        env:
          DIRECT_OAUTH_TOKEN: ${{ secrets.DIRECT_OAUTH_TOKEN }}
          DIRECT_CLIENT_LOGIN: ${{ secrets.DIRECT_CLIENT_LOGIN }}
          METRIKA_OAUTH_TOKEN: ${{ secrets.METRIKA_OAUTH_TOKEN }}
          METRIKA_COUNTER_ID: ${{ secrets.METRIKA_COUNTER_ID }}
          METRIKA_GOAL_ID: ${{ secrets.METRIKA_GOAL_ID }}
          METRIKA_GOAL_ID_SECONDARY: ${{ secrets.METRIKA_GOAL_ID_SECONDARY }}
          METRIKA_GOAL_ID_TERTIARY: ${{ secrets.METRIKA_GOAL_ID_TERTIARY }}
        run: python scripts/hupp-feed/__main__.py --work-dir .

      - name: Commit updated data
        run: |
          git config user.name "Hupp Feed Bot"
          git config user.email "feed-bot@users.noreply.github.com"
          echo "=== data after feed ==="
          ls -la data/hupp-* || true
          python3 -c "import json; m=json.load(open('data/hupp-meta.json')); print('until:', m.get('until'), 'days:', m.get('days'), 'errors:', m.get('errors'))"
          git add data/hupp-daily.csv data/hupp-cohort.json data/hupp-meta.json
          git status --short
          if git diff --staged --quiet; then
            echo "::warning::No data changes — verify GitHub Secrets and API access"
            exit 0
          fi
          git commit -m "chore: auto-update Hupp feed data"
          git push origin HEAD:main
